dialog.convertToWebp=Convert to WebP
dialog.webpHelp.tooltip=What does Convert to WebP do?
dialog.webpHelp.title=Feature Details
dialog.webpHelp.content=1. Compression may become slower after enabling Convert to WebP, because the image is converted first and then compressed.\n\n2. Each format conversion also consumes Tinify API quota once, so quota may be used up faster. Free-plan users should use it carefully.\n\n3. This option only works when you have added an active TinyPNG API key.\n\n4. This option currently only attempts conversion for png, jpg, and jpeg images. Existing webp files are not converted again.\n\n5. When conversion succeeds and you save, the original file will be replaced by a .webp file with the same base name.
