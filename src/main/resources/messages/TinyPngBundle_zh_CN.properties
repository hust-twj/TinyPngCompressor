dialog.convertToWebp=转换为 WebP
dialog.webpHelp.tooltip=转换为 WebP 功能说明
dialog.webpHelp.title=功能说明
dialog.webpHelp.content=1. 勾选“转换为 WebP”后，压缩速度可能会变慢，因为需要先转换再压缩\n\n2. 每次格式转换也会额外消耗 1 次 Tinify API 配额，配额消耗会更快，免费用户请谨慎使用\n\n3. 该选项仅对已添加 active 状态的TinyPNG API Key 用户生效\n\n4. 该选项仅会尝试转换 png、jpg、jpeg 图片，不会重复转换已是 webp 的图片。\n\n5. 转换成功并保存后，原始文件会被同名的 .webp 文件替换。
